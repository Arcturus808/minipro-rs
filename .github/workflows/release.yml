name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  verify-versions:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify version consistency across all files and tag
        run: |
          TAG="${{ github.ref_name }}"
          TAG_VERSION="${TAG#v}"

          echo "Tag: $TAG"
          echo "Expected version: $TAG_VERSION"
          echo ""

          # Extract version from each file
          CARGO_ROOT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          CARGO_GUI=$(grep '^version' gui/src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAURI_CONF=$(grep '"version"' gui/src-tauri/tauri.conf.json | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PKG_JSON=$(grep '"version"' gui/package.json | head -1 | sed 's/.*"\(.*\)".*/\1/')

          echo "Cargo.toml (root):     $CARGO_ROOT"
          echo "gui/src-tauri Cargo:   $CARGO_GUI"
          echo "tauri.conf.json:       $TAURI_CONF"
          echo "package.json:          $PKG_JSON"
          echo ""

          ERRORS=0

          if [ "$CARGO_ROOT" != "$TAG_VERSION" ]; then
            echo "::error::Cargo.toml (root) version '$CARGO_ROOT' does not match tag '$TAG_VERSION'"
            ERRORS=$((ERRORS + 1))
          fi
          if [ "$CARGO_GUI" != "$TAG_VERSION" ]; then
            echo "::error::gui/src-tauri/Cargo.toml version '$CARGO_GUI' does not match tag '$TAG_VERSION'"
            ERRORS=$((ERRORS + 1))
          fi
          if [ "$TAURI_CONF" != "$TAG_VERSION" ]; then
            echo "::error::tauri.conf.json version '$TAURI_CONF' does not match tag '$TAG_VERSION'"
            ERRORS=$((ERRORS + 1))
          fi
          if [ "$PKG_JSON" != "$TAG_VERSION" ]; then
            echo "::error::package.json version '$PKG_JSON' does not match tag '$TAG_VERSION'"
            ERRORS=$((ERRORS + 1))
          fi

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "::error::$ERRORS file(s) have version mismatch. Bump all four version fields before tagging."
            exit 1
          fi

          echo "All versions match tag $TAG_VERSION."

  build:
    needs: verify-versions
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin'
            cli_name: 'minipro-cli-macos-aarch64'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            args: ''
            cli_name: 'minipro-cli-linux-x86_64'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            args: ''
            cli_name: 'minipro-cli-windows-x86_64.exe'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            file

      - name: Build CLI
        run: cargo build --release --locked --bin minipro ${{ matrix.args }}

      - name: Strip and stage CLI binary (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          if [ -n "${{ matrix.args }}" ]; then
            BIN="target/${{ matrix.target }}/release/minipro"
          else
            BIN="target/release/minipro"
          fi
          strip "$BIN"
          cp "$BIN" "${{ matrix.cli_name }}"

      - name: Strip and stage CLI binary (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          copy target\release\minipro.exe ${{ matrix.cli_name }}

      - name: Install frontend dependencies
        working-directory: ./gui
        run: npm install

      - name: Build and release GUI
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './gui'
          tagName: ${{ github.ref_name }}
          releaseName: 'MINIPRO-RS ${{ github.ref_name }}'
          releaseBody: |
            ## GUI Installers
            - **Windows**: `.msi` installer + `.exe` NSIS installer
            - **Linux**: `.AppImage` + `.deb` (Debian/Ubuntu)
            - **macOS**: `.dmg` (Apple Silicon — M1/M2/M3)

            ## CLI Binaries
            Standalone `minipro` CLI binaries for each platform are attached below.
            No installation required — download, make executable (`chmod +x`), and run.

            See [CHANGELOG.md](https://gitlab.com/arcturus8081/minipro-rs/-/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload CLI binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} ${{ matrix.cli_name }} --clobber

      - name: Update release body from CHANGELOG (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          CHANGELOG_SECTION=$(sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '$d')
          if [ -z "$CHANGELOG_SECTION" ]; then
            CHANGELOG_SECTION="Release ${TAG}"
          fi
          {
            printf '%s\n' "$CHANGELOG_SECTION"
            echo ''
            echo '---'
            echo ''
            echo '## Installers'
            echo ''
            echo '- **Linux**: `.deb` (Debian/Ubuntu)'
            echo '- **Windows users**: Download `.msi` / `.exe` from GitHub Releases — native MSVC builds scan clean. The GitLab Windows binaries are cross-compiled and may trigger AV heuristics.'
            echo ''
            echo '## CLI Binaries'
            echo 'Standalone `minipro` CLI binaries for Linux and Windows are attached below.'
            echo ''
            echo 'See [CHANGELOG.md](https://gitlab.com/arcturus8081/minipro-rs/-/blob/main/CHANGELOG.md) for full history.'
          } > /tmp/release_notes.md
          gh release edit "${TAG}" --notes-file /tmp/release_notes.md
