# .gitlab-ci.yml
#
# Pipeline stages:
#   check  — fast lint / format gate (no cross-compilation)
#   test   — unit + integration tests on Linux
#   build  — release binaries for Linux x86_64, Windows x86_64
#   package — .deb, .rpm, Windows .msi, shell completion archives
#   deploy  — GitLab Pages (HTML docs)
#
# Artifacts from `package` are attached to each pipeline run and to any
# tag/release.  Semantic versioning: tag the repo as `v0.2.0` to publish a
# release artifact set.

# --- Compute-minutes gate ---
# Remove this block to restore per-push pipelines once quota is available.
workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web"  # allow manual trigger via "Run pipeline"

default:
  image: rust:1.93

variables:
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  # Cache key includes Cargo.lock so the cache is busted on dependency changes.
  CACHE_KEY: "cargo-${CI_COMMIT_REF_SLUG}-${CI_JOB_NAME}"

# ── Cache ─────────────────────────────────────────────────────────────────────

.cargo_cache: &cargo_cache
  cache:
    key: "${CACHE_KEY}"
    paths:
      - .cargo/registry/
      - .cargo/git/
      - target/

# ── Stage definitions ─────────────────────────────────────────────────────────

stages:
  - check
  - test
  - build
  - package
  - deploy

# ── Check ─────────────────────────────────────────────────────────────────────

fmt:
  stage: check
  <<: *cargo_cache
  script:
    - rustup component add rustfmt
    - cargo fmt --all -- --check

clippy:
  stage: check
  <<: *cargo_cache
  script:
    - rustup component add clippy
    - cargo clippy --all-targets --all-features -- -D warnings

# ── Test ──────────────────────────────────────────────────────────────────────

test:linux:
  stage: test
  <<: *cargo_cache
  script:
    - cargo test --all --locked
  artifacts:
    reports:
      junit: target/nextest/default/*.xml
    expire_in: 1 week

# ── Build ─────────────────────────────────────────────────────────────────────

.build_common: &build_common
  stage: build
  <<: *cargo_cache
  script:
    - cargo build --release --locked --bin minipro
  artifacts:
    expire_in: 1 week

build:linux-x86_64:
  <<: *build_common
  artifacts:
    name: "minipro-linux-x86_64-${CI_COMMIT_SHORT_SHA}"
    paths:
      - target/release/minipro

build:windows-x86_64:
  <<: *build_common
  before_script:
    - rustup target add x86_64-pc-windows-gnu
    - apt-get update -q && apt-get install -qy mingw-w64
  script:
    - cargo build --release --locked --bin minipro --target x86_64-pc-windows-gnu
  artifacts:
    name: "minipro-windows-x86_64-${CI_COMMIT_SHORT_SHA}"
    paths:
      - target/x86_64-pc-windows-gnu/release/minipro.exe

# ── Package ───────────────────────────────────────────────────────────────────

.package_needs: &package_needs
  stage: package
  needs:
    - build:linux-x86_64

# Shell completion + man page archive -----------------------------------------
completions:
  <<: [*package_needs, *cargo_cache]
  script:
    - mkdir -p dist/completions dist/man/man1
    - target/release/minipro --generate-completions bash        > dist/completions/minipro.bash
    - target/release/minipro --generate-completions zsh         > dist/completions/_minipro
    - target/release/minipro --generate-completions fish        > dist/completions/minipro.fish
    - target/release/minipro --generate-completions powershell  > dist/completions/_minipro.ps1
    - target/release/minipro --generate-man                     > dist/man/man1/minipro.1
    - tar -czf "minipro-completions-${CI_COMMIT_SHORT_SHA}.tar.gz" -C dist completions man
  artifacts:
    name: "minipro-completions-${CI_COMMIT_SHORT_SHA}"
    paths:
      - "minipro-completions-*.tar.gz"
    expire_in: 1 week

# Debian package ---------------------------------------------------------------
deb:
  <<: *package_needs
  script:
    - |
      apt-get update -q && apt-get install -qy dpkg-dev
      VERSION=$(cargo metadata --no-deps --format-version 1 \
        | python3 -c "import sys,json; print(json.load(sys.stdin)['packages'][0]['version'])")
      PKGDIR="minipro_${VERSION}_amd64"
      mkdir -p "${PKGDIR}/DEBIAN" \
               "${PKGDIR}/usr/bin" \
               "${PKGDIR}/usr/share/bash-completion/completions" \
               "${PKGDIR}/usr/share/zsh/site-functions" \
               "${PKGDIR}/usr/share/fish/vendor_completions.d" \
               "${PKGDIR}/usr/share/man/man1"
      cp target/release/minipro "${PKGDIR}/usr/bin/minipro"
      target/release/minipro --generate-completions bash > "${PKGDIR}/usr/share/bash-completion/completions/minipro"
      target/release/minipro --generate-completions zsh  > "${PKGDIR}/usr/share/zsh/site-functions/_minipro"
      target/release/minipro --generate-completions fish > "${PKGDIR}/usr/share/fish/vendor_completions.d/minipro.fish"
      target/release/minipro --generate-man | gzip -9   > "${PKGDIR}/usr/share/man/man1/minipro.1.gz"
      printf 'Package: minipro\nVersion: %s\nArchitecture: amd64\nMaintainer: minipro-rs contributors\nDescription: Open-source programmer for XGecu TL866xx/T48/T56/T76\n Rust reimplementation of the minipro chip programmer utility.\nDepends: libc6\n' \
        "${VERSION}" > "${PKGDIR}/DEBIAN/control"
      dpkg-deb --build "${PKGDIR}"
  artifacts:
    name: "minipro-deb-${CI_COMMIT_SHORT_SHA}"
    paths:
      - "minipro_*.deb"
    expire_in: 1 week

# RPM package ------------------------------------------------------------------
rpm:
  <<: *package_needs
  image: fedora:latest
  script:
    - |
      dnf install -qy rpm-build curl gcc python3
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.93
      source "${CARGO_HOME:-$HOME/.cargo}/env"
      cargo build --release --locked --bin minipro
      VERSION=$(cargo metadata --no-deps --format-version 1 \
        | python3 -c "import sys,json; print(json.load(sys.stdin)['packages'][0]['version'])")
      mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
      printf '%s\n' \
        'Name:           minipro' \
        "Version:        ${VERSION}" \
        'Release:        1%{?dist}' \
        'Summary:        Open-source programmer for XGecu TL866xx/T48/T56/T76' \
        'License:        GPL-3.0-or-later' \
        'BuildArch:      x86_64' \
        '' \
        '%description' \
        'Rust reimplementation of the minipro chip programmer utility.' \
        '' \
        '%install' \
        "install -Dm755 ${PWD}/target/release/minipro %{buildroot}%{_bindir}/minipro" \
        "install -Dm644 <(target/release/minipro --generate-man | gzip -9) %{buildroot}%{_mandir}/man1/minipro.1.gz" \
        '' \
        '%files' \
        '%{_bindir}/minipro' \
        '%{_mandir}/man1/minipro.1.gz' \
        > ~/rpmbuild/SPECS/minipro.spec
      rpmbuild -bb ~/rpmbuild/SPECS/minipro.spec
      find ~/rpmbuild/RPMS -name '*.rpm' -exec cp {} . \;
  artifacts:
    name: "minipro-rpm-${CI_COMMIT_SHORT_SHA}"
    paths:
      - "*.rpm"
    expire_in: 1 week

# Windows MSI ------------------------------------------------------------------
msi:
  stage: package
  needs:
    - build:windows-x86_64
  image: fedora:latest
  before_script:
    - dnf install -qy msitools
  script:
    - |
      VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
      wixl -D ProductVersion="${VERSION}" -a x64 \
        -o "minipro_${VERSION}_x86_64.msi" \
        crates/minipro-cli/wix/main.wxs
  artifacts:
    name: "minipro-msi-${CI_COMMIT_SHORT_SHA}"
    paths:
      - "*.msi"
    expire_in: 1 week

# ── Release (tag-triggered) ───────────────────────────────────────────────────

release:
  stage: package
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
  needs:
    - completions
    - deb
    - rpm
    - msi
  script:
    - echo "Creating release for ${CI_COMMIT_TAG}"
  release:
    name: "minipro-rs ${CI_COMMIT_TAG}"
    description: "See CHANGELOG.md for details."
    tag_name: "${CI_COMMIT_TAG}"
    assets:
      links:
        - name: "Linux x86_64 binary"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/target/release/minipro?job=build:linux-x86_64"
        - name: "Windows x86_64 binary"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/target/x86_64-pc-windows-gnu/release/minipro.exe?job=build:windows-x86_64"
        - name: "Debian package"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/browse?job=deb"
        - name: "RPM package"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/browse?job=rpm"
        - name: "Windows MSI"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/browse?job=msi"
        - name: "Shell completions"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/browse?job=completions"

# ── GitLab Pages (HTML docs) ──────────────────────────────────────────────────

pages:
  stage: deploy
  image: ubuntu:latest
  needs:
    - build:linux-x86_64
  script:
    - apt-get update -q && apt-get install -qy pandoc
    - mkdir -p public
    # Write a minimal stylesheet (system-ui picks native OS font)
    - |
      cat > style.css << 'EOF'
      body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
             max-width: 900px; margin: 0 auto; padding: 1em 2em; line-height: 1.6; color: #222; }
      code, pre { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
                  font-size: 0.9em; }
      pre { background: #f4f4f4; padding: 0.8em 1em; border-radius: 4px; overflow-x: auto; }
      a { color: #0066cc; }
      h1, h2, h3 { border-bottom: 1px solid #ddd; padding-bottom: 0.2em; }
      EOF
    - cp style.css public/style.css
    # Generate man page → HTML
    - chmod +x target/release/minipro
    - target/release/minipro --generate-man > minipro.1
    - |
      pandoc -s -f man -t html5 \
        --css style.css \
        --metadata title="minipro(1) — manual page" \
        -o public/minipro.1.html minipro.1
    # Convert README → index
    - |
      pandoc -s -f gfm -t html5 \
        --css style.css \
        --metadata title="minipro-rs" \
        -o public/index.html README.md
    # Inject a simple nav bar into both pages
    - |
      NAV='<nav style="font-family:sans-serif;padding:0.5em 1em;background:#f5f5f5;border-bottom:1px solid #ccc"><a href="index.html">Home<\/a> &nbsp;|&nbsp; <a href="minipro.1.html">Manual Page<\/a><\/nav>'
      sed -i "s@<body>@<body>$NAV@" public/index.html public/minipro.1.html
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
